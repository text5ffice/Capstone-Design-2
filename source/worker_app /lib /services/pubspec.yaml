name: safety_app
description: 건설현장 안전관리 시스템

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 센서
  sensors_plus: ^4.0.2          # 가속도계 + 자이로스코프

  # 위치
  geolocator: ^11.0.0           # GPS 위치

  # 오디오
  audioplayers: ^6.0.0          # 부저음 재생
  flutter_tts: ^4.0.2           # 음성 안내 (TTS)

  # 네트워크
  http: ^1.2.0                  # 하드웨어/백엔드 통신

  # (푸시 알림 - 나중에 추가)
  # firebase_core: ^2.x.x
  # firebase_messaging: ^14.x.x

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/              # 부저음 파일 폴더
